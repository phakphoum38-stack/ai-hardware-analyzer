name: CI

on: [push]

jobs:

 build:

  runs-on: ubuntu-latest

  steps:

  - uses: actions/checkout@v3

  - name: setup python
    uses: actions/setup-python@v4
    with:
      python-version: 3.10

  - name: install
    run: pip install -r requirements.txt

  - name: test
    run: python -c "import backend.main"
